name: CI

# 雛形 CI workflow。stack 確定後に install / build / test / e2e ステップを埋める。
# 詳細は WG05 の参考実装を参照: https://github.com/saainekoaidev/wg05-sandbox/blob/main/.github/workflows/ci.yml

on:
  push:
  pull_request:
    branches: [main]

# 同一 ref への連続 push で進行中の旧 run を自動キャンセル。
# main は merge 後の検証が後続 push でキャンセルされないように対象外にする。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: build + unit + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

