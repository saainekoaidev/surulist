name: CI

on:
  push:
  pull_request:
    branches: [main]

# 同一 ref への連続 push で進行中の旧 run を自動キャンセル。
# main は merge 後の検証が後続 push でキャンセルされないように対象外にする。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: build + unit + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend exec prisma generate

      - name: Build
        run: pnpm -r build

      - name: Unit tests
        run: pnpm -r test

      - name: Install Playwright browsers
        run: pnpm --filter frontend exec playwright install --with-deps chromium

      - name: Create test database
        run: pnpm --filter backend exec prisma migrate deploy
        env:
          DATABASE_URL: "file:./test.db"

      - name: E2E tests
        run: pnpm --filter frontend test:e2e
        env:
          DATABASE_URL: "file:./test.db"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
